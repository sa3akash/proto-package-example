name: Publish NPM Package

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (npm pack only, no publish)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    name: Build & Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup Buf & generate code ──────────────────────────────────────────
      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate proto code (TS + Go)
        run: buf generate

      # ── Setup Bun ──────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build TypeScript
        run: bun run build

      # ── Extract version from git tag ───────────────────────────────────────
      - name: Set package version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "Publishing version: $TAG"
          npm version "$TAG" --no-git-tag-version

      # ── Dry run ───────────────────────────────────────────────────────────
      - name: Pack (dry run preview)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: npm pack --dry-run

      # ── Publish ────────────────────────────────────────────────────────────
      - name: Setup Node.js (for npm publish)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true) }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true) }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Ensure go.sum is committed and Go module compiles ─────────────────────
  verify-go:
    name: Verify Go Module
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Go code
        run: buf generate

      - name: Tidy Go dependencies
        run: go mod tidy

      - name: Build Go module
        run: go build ./...
