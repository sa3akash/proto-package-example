syntax = "proto3";

package users.v1;

option go_package = "github.com/sa3akash/proto-package-example/gen/go/users/v1;usersv1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// ─── Enums ────────────────────────────────────────────────────────────────────

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_USER        = 1;
  USER_ROLE_ADMIN       = 2;
  USER_ROLE_MODERATOR   = 3;
}

// ─── Core Message ─────────────────────────────────────────────────────────────

message User {
  string                    id         = 1 [(buf.validate.field).string.uuid = true];
  string                    name       = 2 [(buf.validate.field).string = {min_len: 1, max_len: 100}];
  string                    email      = 3 [(buf.validate.field).string.email = true];
  UserRole                  role       = 4 [(buf.validate.field).enum.defined_only = true];
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// ─── Create ───────────────────────────────────────────────────────────────────

message CreateUserRequest {
  string name = 1 [
    (buf.validate.field).string = {
      min_len: 2,
      max_len: 100,
      pattern: "^[a-zA-Z0-9 _-]+$"
    }
  ];
  string email = 2 [(buf.validate.field).string.email = true];
  UserRole role = 3 [
    (buf.validate.field).enum = {
      defined_only: true,
      not_in: [0]
    }
  ];
}

message CreateUserResponse {
  User user = 1 [(buf.validate.field).required = true];
}

// ─── Get ──────────────────────────────────────────────────────────────────────

message GetUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetUserResponse {
  User user = 1 [(buf.validate.field).required = true];
}

// ─── Update (all optional fields — skip validation when zero/empty) ───────────

message UpdateUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];

  string name = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {min_len: 2, max_len: 100, pattern: "^[a-zA-Z0-9 _-]+$"}
  ];

  string email = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.email = true
  ];

  UserRole role = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).enum.defined_only = true
  ];
}

message UpdateUserResponse {
  User user = 1 [(buf.validate.field).required = true];
}

// ─── Delete ───────────────────────────────────────────────────────────────────

message DeleteUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteUserResponse {
  bool success = 1;
}

// ─── List ─────────────────────────────────────────────────────────────────────

message ListUsersRequest {
  int32 page      = 1 [(buf.validate.field).int32 = {gte: 1}];
  int32 page_size = 2 [(buf.validate.field).int32 = {gte: 1, lte: 100}];

  string search = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 200
  ];
}

message ListUsersResponse {
  repeated User users       = 1;
  int32         total       = 2 [(buf.validate.field).int32.gte = 0];
  int32         page        = 3 [(buf.validate.field).int32.gte = 1];
  int32         page_size   = 4 [(buf.validate.field).int32.gte = 1];
  int32         total_pages = 5 [(buf.validate.field).int32.gte = 0];
}

// ─── Service ─────────────────────────────────────────────────────────────────

service UserService {
  rpc CreateUser (CreateUserRequest)  returns (CreateUserResponse);
  rpc GetUser    (GetUserRequest)     returns (GetUserResponse);
  rpc UpdateUser (UpdateUserRequest)  returns (UpdateUserResponse);
  rpc DeleteUser (DeleteUserRequest)  returns (DeleteUserResponse);
  rpc ListUsers  (ListUsersRequest)   returns (ListUsersResponse);
}