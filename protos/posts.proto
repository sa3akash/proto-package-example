syntax = "proto3";

package posts.v1;

option go_package = "github.com/sa3akash/proto-package-example/gen/go/posts/v1;postsv1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// ─── Enums ────────────────────────────────────────────────────────────────────

enum PostStatus {
  POST_STATUS_UNSPECIFIED = 0;
  POST_STATUS_DRAFT       = 1;
  POST_STATUS_PUBLISHED   = 2;
  POST_STATUS_ARCHIVED    = 3;
}

// ─── Core Message ─────────────────────────────────────────────────────────────

message Post {
  string                    id         = 1 [(buf.validate.field).string.uuid = true];
  string                    title      = 2 [(buf.validate.field).string = {min_len: 1, max_len: 200}];
  string                    content    = 3 [(buf.validate.field).string = {min_len: 1, max_len: 100000}];
  string                    author_id  = 4 [(buf.validate.field).string.uuid = true];
  PostStatus                status     = 5 [(buf.validate.field).enum.defined_only = true];
  repeated string           tags       = 6 [
    (buf.validate.field).repeated = {
      max_items: 20,
      items: {string: {min_len: 1, max_len: 50}}
    }
  ];
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// ─── Create ───────────────────────────────────────────────────────────────────

message CreatePostRequest {
  string title = 1 [
    (buf.validate.field).string = {min_len: 1, max_len: 200}
  ];
  string content = 2 [
    (buf.validate.field).string = {min_len: 1, max_len: 100000}
  ];
  string author_id = 3 [(buf.validate.field).string.uuid = true];

  PostStatus status = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).enum.defined_only = true
  ];

  repeated string tags = 5 [
    (buf.validate.field).repeated = {
      max_items: 20,
      items: {string: {min_len: 1, max_len: 50}}
    }
  ];
}

message CreatePostResponse {
  Post post = 1 [(buf.validate.field).required = true];
}

// ─── Get ──────────────────────────────────────────────────────────────────────

message GetPostRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetPostResponse {
  Post post = 1 [(buf.validate.field).required = true];
}

// ─── Update (all optional fields — skip validation when zero/empty) ───────────

message UpdatePostRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];

  string title = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {min_len: 1, max_len: 200}
  ];

  string content = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {min_len: 1, max_len: 100000}
  ];

  PostStatus status = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).enum.defined_only = true
  ];

  repeated string tags = 5 [
    (buf.validate.field).repeated = {
      max_items: 20,
      items: {string: {min_len: 1, max_len: 50}}
    }
  ];
}

message UpdatePostResponse {
  Post post = 1 [(buf.validate.field).required = true];
}

// ─── Delete ───────────────────────────────────────────────────────────────────

message DeletePostRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeletePostResponse {
  bool success = 1;
}

// ─── List ─────────────────────────────────────────────────────────────────────

message ListPostsRequest {
  int32 page      = 1 [(buf.validate.field).int32 = {gte: 1}];
  int32 page_size = 2 [(buf.validate.field).int32 = {gte: 1, lte: 100}];

  string author_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  PostStatus status = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).enum.defined_only = true
  ];

  string search = 5 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 200
  ];
}

message ListPostsResponse {
  repeated Post posts       = 1;
  int32         total       = 2 [(buf.validate.field).int32.gte = 0];
  int32         page        = 3 [(buf.validate.field).int32.gte = 1];
  int32         page_size   = 4 [(buf.validate.field).int32.gte = 1];
  int32         total_pages = 5 [(buf.validate.field).int32.gte = 0];
}

// ─── Service ─────────────────────────────────────────────────────────────────

service PostService {
  rpc CreatePost (CreatePostRequest)  returns (CreatePostResponse);
  rpc GetPost    (GetPostRequest)     returns (GetPostResponse);
  rpc UpdatePost (UpdatePostRequest)  returns (UpdatePostResponse);
  rpc DeletePost (DeletePostRequest)  returns (DeletePostResponse);
  rpc ListPosts  (ListPostsRequest)   returns (ListPostsResponse);
}